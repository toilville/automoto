version: '3.8'

services:
  starter:
    build:
      context: ../..
      dockerfile: microsoft/deploy/Dockerfile
    ports:
      - "8010:8010"
    environment:
      - API_TOKEN=${API_TOKEN:-}
      - FOUNDRY_ENABLED=${FOUNDRY_ENABLED:-false}
      - FOUNDRY_PROJECT_ENDPOINT=${FOUNDRY_PROJECT_ENDPOINT:-}
      - FOUNDRY_SUBSCRIPTION_ID=${FOUNDRY_SUBSCRIPTION_ID:-}
      - FOUNDRY_RESOURCE_GROUP=${FOUNDRY_RESOURCE_GROUP:-}
      - FOUNDRY_PROJECT_NAME=${FOUNDRY_PROJECT_NAME:-}
      - FOUNDRY_MODEL_DEPLOYMENT=${FOUNDRY_MODEL_DEPLOYMENT:-gpt-4o}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
