# Automoto Platform — nginx reverse proxy
#
# Routes external traffic to channel-specific services.
# Can operate in two modes:
#   1. Gateway mode: All traffic → gateway:8080 (gateway handles routing)
#   2. Direct mode: nginx routes directly to each upstream service
#
# This config uses DIRECT MODE for maximum flexibility and performance.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with upstream info
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/event-stream;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=chat_api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=webhook_api:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=general_api:10m rate=300r/m;

    # Upstream definitions
    upstream chat_app { server localhost:5173; keepalive 32; }
    upstream home_app { server localhost:5174; keepalive 32; }
    upstream teams_app { server localhost:5175; keepalive 32; }
    upstream agents_sdk_app { server localhost:5176; keepalive 32; }
    upstream m365_agents { server localhost:3978; keepalive 16; }
    upstream message_extension { server localhost:7074; keepalive 16; }
    upstream copilot_knowledge { server localhost:8081; keepalive 16; }
    upstream power_platform { server localhost:7072; keepalive 16; }
    upstream github_copilot { server localhost:7073; keepalive 16; }
    upstream direct_line { server localhost:7075; keepalive 32; }
    upstream mcp_server { server localhost:3100; keepalive 16; }
    upstream gateway { server localhost:8080; keepalive 32; }

    # ─── Main server (HTTPS) ───────────────────────────────
    server {
        listen 443 ssl http2;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── Health / Status ────────────────────────────
        location /health {
            proxy_pass http://gateway/health;
            proxy_set_header Host $host;
        }

        location /api/services {
            proxy_pass http://gateway/api/services;
            proxy_set_header Host $host;
        }

        # ─── Web Chat App (default / root) ──────────────
        location / {
            proxy_pass http://chat_app;
            include /etc/nginx/includes/proxy-common.conf;
            include /etc/nginx/includes/sse-support.conf;
        }

        # Chat API — rate limited, SSE streaming
        location /api/chat {
            limit_req zone=chat_api burst=10 nodelay;
            proxy_pass http://chat_app;
            include /etc/nginx/includes/proxy-common.conf;
            include /etc/nginx/includes/sse-support.conf;
        }

        # ─── Homepage ───────────────────────────────────
        location /home/ {
            proxy_pass http://home_app/;
            include /etc/nginx/includes/proxy-common.conf;
            include /etc/nginx/includes/sse-support.conf;
        }

        # ─── Teams App ──────────────────────────────────
        location /teams/ {
            proxy_pass http://teams_app/;
            include /etc/nginx/includes/proxy-common.conf;
            include /etc/nginx/includes/sse-support.conf;
        }

        # ─── Agents SDK App ─────────────────────────────
        location /agents-sdk/ {
            proxy_pass http://agents_sdk_app/;
            include /etc/nginx/includes/proxy-common.conf;
            include /etc/nginx/includes/sse-support.conf;
        }

        # ─── M365 Bot Framework Webhook ─────────────────
        # Teams/Outlook sends activities here
        location /m365/api/messages {
            limit_req zone=webhook_api burst=20 nodelay;
            proxy_pass http://m365_agents/api/messages;
            include /etc/nginx/includes/proxy-common.conf;
        }

        location /m365/api/health {
            proxy_pass http://m365_agents/api/health;
            include /etc/nginx/includes/proxy-common.conf;
        }

        # ─── Message Extension Webhook ───────────────────
        location /message-ext/api/messages {
            limit_req zone=webhook_api burst=20 nodelay;
            proxy_pass http://message_extension/api/messages;
            include /etc/nginx/includes/proxy-common.conf;
        }

        location /message-ext/api/health {
            proxy_pass http://message_extension/api/health;
            include /etc/nginx/includes/proxy-common.conf;
        }

        # ─── Copilot Knowledge Connector API ─────────────
        location /copilot-knowledge/ {
            limit_req zone=general_api burst=50 nodelay;
            proxy_pass http://copilot_knowledge/;
            include /etc/nginx/includes/proxy-common.conf;
        }

        # ─── Power Platform Connector API ────────────────
        location /power-platform/ {
            limit_req zone=general_api burst=50 nodelay;
            proxy_pass http://power_platform/;
            include /etc/nginx/includes/proxy-common.conf;
        }

        # ─── GitHub Copilot Extension Webhook ────────────
        location /github-copilot/agent {
            limit_req zone=webhook_api burst=20 nodelay;
            proxy_pass http://github_copilot/agent;
            include /etc/nginx/includes/proxy-common.conf;
            include /etc/nginx/includes/sse-support.conf;
        }

        location /github-copilot/health {
            proxy_pass http://github_copilot/health;
            include /etc/nginx/includes/proxy-common.conf;
        }

        # ─── Direct Line WebChat Widget ──────────────────
        location /direct-line/ {
            proxy_pass http://direct_line/;
            include /etc/nginx/includes/proxy-common.conf;
        }

        # Allow iframe embedding for the widget
        location /direct-line/widget {
            proxy_pass http://direct_line/widget;
            include /etc/nginx/includes/proxy-common.conf;
            # Override X-Frame-Options to allow embedding
            add_header X-Frame-Options "" always;
            add_header Content-Security-Policy "frame-ancestors *" always;
        }

        # ─── MCP Server (SSE transport) ─────────────────
        location /mcp/sse {
            proxy_pass http://mcp_server/sse;
            include /etc/nginx/includes/proxy-common.conf;
            include /etc/nginx/includes/sse-support.conf;
            # MCP SSE connections can be long-lived
            proxy_read_timeout 3600s;
        }

        location /mcp/messages {
            proxy_pass http://mcp_server/messages;
            include /etc/nginx/includes/proxy-common.conf;
        }

        location /mcp/health {
            proxy_pass http://mcp_server/health;
            include /etc/nginx/includes/proxy-common.conf;
        }
    }

    # ─── HTTP → HTTPS redirect ──────────────────────────
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }
}
