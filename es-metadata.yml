# schemaVersion is required
schemaVersion: 1.0.0

# schemaVersion 1.0.0 introduces the concept of providers allowing other registered providers
# to include metadata in the EsMetadata file.
providers:
  - provider: InventoryAsCode
    version: 1.0.0
    metadata:
      # isProduction (Classification) - Declares whether the code is production or non-production.
      isProduction: false

      # accountableOwners (Ownership) - service is the unique identifier for a service (Service Tree / aka.ms/servicetree).
      accountableOwners:
        service: 0df94dc0-200c-4d55-a822-989395ea222f

      # routing (Routing) - default area path for work item routing (bugs, etc).
      routing:
        defaultAreaPath:
          org: msresearch
          path: EventAgent

      # consumingServices (optional) - Services that rely on this repo but do not own any part of it.
      # consumingServices: []
