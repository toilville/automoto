post_install:
  instructions_markdown: |
    ## 🎯 MSR Channel Kit Installed!

    ### Quick Start

    Run the channel onboarding questionnaire:

    ```bash
    python .vibe-kit/innovation-kits/msr-channel/initialization/questionnaire.py
    ```

    The wizard will ask:
    - **Producer or consumer?** — Are you building a new channel or embedding an existing one?
    - **Platform details** — Streaming support, auth model, framework choice
    - Generate a ready-to-go project scaffold

    ### Two Paths

    | Path | You want to... | Template |
    |------|---------------|----------|
    | **Producer** | Connect a new platform (Slack, WhatsApp, internal portal) to the MSR Agent | `express-channel`, `bot-framework-channel`, `webhook-channel` |
    | **Consumer** | Embed MSR Agent chat in your app/site | `react-embed`, `api-client`, `direct-line-embed` |

    ### Key Concept: pub / sub / stream

    Every channel adapter implements three methods:
    - `pub(native)` → canonical `AgentRequest` (normalize inbound)
    - `sub(response)` → native format (format outbound)
    - `stream(event)` → native chunk (format streaming events)

    📖 See `docs/protocol-reference.md` for the full contract.
